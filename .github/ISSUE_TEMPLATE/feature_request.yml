name: Feature request
description: Suggest a new feature or compatibility improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the proposed change and any upstream SVGO behavior it should match.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add links, examples, fixtures, or related issues if helpful.
